version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fueleu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fueleu
      POSTGRES_PASSWORD: fueleu_pass
      POSTGRES_DB: fueleu_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fueleu -d fueleu_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
